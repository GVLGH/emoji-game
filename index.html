<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Emoji Match</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(160deg, #e6efff 0%, #f5eaff 100%);
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        .game {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        /* Header */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 20px;
            font-weight: 800;
            color: #6b4fba;
            letter-spacing: -0.3px;
        }

        .score {
            background: white;
            border-radius: 50px;
            padding: 7px 16px;
            font-size: 15px;
            font-weight: 700;
            color: #6b4fba;
            box-shadow: 0 2px 12px rgba(107,79,186,0.18);
        }

        /* Instruction */
        .hint {
            font-size: 15px;
            font-weight: 600;
            color: #9a88cc;
        }

        /* Target area */
        .target-card {
            background: white;
            border-radius: 28px;
            padding: 24px 32px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 32px rgba(107,79,186,0.10);
        }

        #target {
            font-size: clamp(90px, 24vw, 116px);
            line-height: 1;
            user-select: none;
        }

        /* Option buttons */
        .options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
        }

        .opt {
            background: white;
            border: 3px solid transparent;
            border-radius: 22px;
            padding: 14px 6px;
            font-size: clamp(52px, 14vw, 68px);
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 14px rgba(0,0,0,0.07);
            transition: transform 0.12s ease, border-color 0.15s, background 0.15s;
            user-select: none;
            touch-action: manipulation;
        }

        .opt:not(:disabled):active {
            transform: scale(0.91);
        }

        .opt.correct {
            border-color: #86efac;
            background: #f0fdf4;
            animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .opt.wrong {
            border-color: #fca5a5;
            background: #fff1f2;
            animation: shake 0.4s ease forwards;
        }

        .opt:disabled { cursor: default; }

        .opt:disabled:not(.correct) {
            opacity: 0.35;
            box-shadow: none;
        }

        @keyframes pop {
            0%   { transform: scale(1); }
            55%  { transform: scale(1.13); }
            100% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            20%       { transform: translateX(-8px) rotate(-3deg); }
            40%       { transform: translateX(8px) rotate(3deg); }
            60%       { transform: translateX(-5px) rotate(-1deg); }
            80%       { transform: translateX(5px) rotate(1deg); }
        }

        /* Feedback message */
        .feedback {
            height: 26px;
            font-size: 17px;
            font-weight: 700;
            text-align: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .feedback.show     { opacity: 1; }
        .feedback.show.ok  { color: #16a34a; }
        .feedback.show.no  { color: #dc2626; }
    </style>
</head>
<body>

<div class="game">
    <div class="header">
        <span class="title">вЬ® Emoji Match</span>
        <span class="score" id="score">в≠Р 0</span>
    </div>

    <p class="hint">Find the same one!</p>

    <div class="target-card">
        <div id="target"></div>
    </div>

    <div class="options" id="options"></div>

    <div class="feedback" id="feedback"></div>
</div>

<script>
const EMOJIS = [
    'рЯРґ','рЯР±','рЯР≠','рЯРє','рЯР∞','рЯ¶К','рЯРї','рЯРЉ','рЯР®','рЯРѓ','рЯ¶Б',
    'рЯРЄ','рЯРµ','рЯРФ','рЯРІ','рЯ¶Ж','рЯ¶Й','рЯРі','рЯ¶Д','рЯРЭ','рЯ¶Л','рЯРЮ',
    'рЯНО','рЯНК','рЯНЛ','рЯНЗ','рЯНУ','рЯНТ','рЯНМ','рЯНЙ','рЯМљ','рЯНД',
    'рЯМЄ','рЯМї','в≠Р','рЯМИ','вШАпЄП','рЯМЩ',
    'рЯОИ','рЯЪЧ','рЯЪВ','вЬИпЄП','рЯП†','рЯОБ','вЪљ','рЯПА','рЯОВ','рЯН¶','рЯН©','рЯН™'
];

let score = 0, target = null, locked = false, audioCtx = null;

function getCtx() {
    return audioCtx || (audioCtx = new (window.AudioContext || window.webkitAudioContext)());
}

function beep(type) {
    try {
        const ctx = getCtx(), t = ctx.currentTime;
        const master = ctx.createGain();
        master.connect(ctx.destination);
        if (type === 'ok') {
            // Gentle ascending chord: C E G
            [[523, 0], [659, 0.13], [784, 0.26]].forEach(([freq, dt]) => {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq;
                const g = ctx.createGain();
                g.gain.setValueAtTime(0.2, t + dt);
                g.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.4);
                osc.connect(g);
                g.connect(master);
                osc.start(t + dt);
                osc.stop(t + dt + 0.45);
            });
        } else {
            // Soft descending tone
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(330, t);
            osc.frequency.exponentialRampToValueAtTime(210, t + 0.3);
            const g = ctx.createGain();
            g.gain.setValueAtTime(0.16, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
            osc.connect(g);
            g.connect(master);
            osc.start(t);
            osc.stop(t + 0.35);
        }
    } catch (_) {}
}

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function round() {
    locked = false;
    showFeedback('', '');

    // Pick a new target (never same as last)
    let t;
    do { t = EMOJIS[Math.random() * EMOJIS.length | 0]; }
    while (t === target && EMOJIS.length > 1);
    target = t;

    document.getElementById('target').textContent = target;

    const distractors = shuffle(EMOJIS.filter(e => e !== target)).slice(0, 2);
    const choices = shuffle([target, ...distractors]);

    const grid = document.getElementById('options');
    grid.innerHTML = '';
    choices.forEach(emoji => {
        const btn = document.createElement('button');
        btn.className = 'opt';
        btn.textContent = emoji;
        btn.onclick = () => pick(emoji, btn);
        grid.appendChild(btn);
    });
}

function pick(chosen, btn) {
    if (locked || btn.disabled) return;

    if (chosen === target) {
        locked = true;
        score++;
        document.getElementById('score').textContent = `в≠Р ${score}`;
        btn.classList.add('correct');
        showFeedback('Well done!', 'ok');
        beep('ok');
        document.querySelectorAll('.opt').forEach(b => b.disabled = true);
        setTimeout(round, 1100);
    } else {
        btn.classList.add('wrong');
        showFeedback('Try again!', 'no');
        beep('no');
        setTimeout(() => {
            btn.classList.remove('wrong');
            btn.disabled = true;
            showFeedback('', '');
        }, 680);
    }
}

function showFeedback(msg, cls) {
    const el = document.getElementById('feedback');
    el.textContent = msg;
    el.className = 'feedback' + (msg ? ` show ${cls}` : '');
}

round();
</script>

</body>
</html>
